name: Update Codemaps

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  update-codemaps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Update codemaps for changed directories
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/ci-update-codemaps.py

      - name: Commit updated codemaps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "**/codemap.md"
          git diff --staged --quiet && echo "No codemap changes" || \
            git commit -m "chore: auto-update codemaps [skip ci]" && git push
